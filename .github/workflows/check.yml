name: camp-watch

on:
  schedule:
    # Every 5 minutes. GitHub may queue/delay free-tier cron under load —
    # in practice expect runs every 5–15 minutes.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: camp-watch
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit path)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run camp-watch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run check

      - name: Commit state changes
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "camp-watch[bot]"
            git config user.email "camp-watch@users.noreply.github.com"
            git add state.json
            git commit -m "state: update notified set"
            git push
          else
            echo "No state changes."
          fi
