name: camp-watch

on:
  # Run every 5 min. GitHub may delay scheduled runs by 5–15 min under load.
  schedule:
    - cron: "*/5 * * * *"
  # Manual button on the Actions tab.
  workflow_dispatch: {}
  # Run on push so any code change deploys immediately. Ignore the paths the
  # workflow itself writes back to avoid an infinite commit→run loop.
  push:
    branches: [main]
    paths-ignore:
      - "state.json"
      - "docs/**"

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

concurrency:
  group: camp-watch
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit path)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # Best-effort: if the scrape or notifier throws, we still want to deploy
      # whatever docs/ currently exists (placeholder on first run, last-built
      # page after). continue-on-error here means subsequent steps run.
      - name: Run camp-watch
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run check

      - name: Commit state + docs
        if: always()
        run: |
          git config user.name "camp-watch[bot]"
          git config user.email "camp-watch@users.noreply.github.com"
          git add state.json docs/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "state + docs: refresh"
            git push
          fi

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: check
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
